spring.application.name=PearsonBank
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jackson.deserialization.fail-on-unknown-properties=true

server.forward-headers-strategy=framework

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=600000
app.refreshToken.expiration=604800000

app.name=Pearson Bank
app.tag=A new world of digital banking
app.generalMail=${APP_MAIL}
app.supportMail=support@pearsonbank.com
app.baseUrl=${BASE_URL}


spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


