spring.application.name=pearsonbank
server.port=8080

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.jackson.deserialization.fail-on-unknown-properties=true
server.forward-headers-strategy=framework

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=600000
app.refreshToken.expiration=604800000

app.name=Pearson Bank
app.tag=A new world of digital banking
app.generalMail=${APP_MAIL}
app.supportMail=support@pearsonbank.com
app.baseUrl=${BASE_URL}


